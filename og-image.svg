<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <radialGradient id="glow1" cx="12%" cy="20%" r="55%">
      <stop offset="0%" stop-color="#00C896" stop-opacity="0.35" />
      <stop offset="100%" stop-color="#00C896" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="glow2" cx="92%" cy="100%" r="55%">
      <stop offset="0%" stop-color="#0078ff" stop-opacity="0.22" />
      <stop offset="100%" stop-color="#0078ff" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="glow3" cx="78%" cy="8%" r="40%">
      <stop offset="0%" stop-color="#c800b4" stop-opacity="0.18" />
      <stop offset="100%" stop-color="#c800b4" stop-opacity="0" />
    </radialGradient>
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#ffffff" stroke-width="1" opacity="0.04" />
    </pattern>
  </defs>

  <rect width="1200" height="630" fill="#000000" />
  <rect width="1200" height="630" fill="url(#grid)" />
  <rect width="1200" height="630" fill="url(#glow1)" />
  <rect width="1200" height="630" fill="url(#glow2)" />
  <rect width="1200" height="630" fill="url(#glow3)" />

  <!-- Logo lockup -->
  <g transform="translate(80, 90)">
    <circle cx="14" cy="14" r="10" fill="#00C896" />
    <circle cx="14" cy="14" r="16" fill="none" stroke="#00C896" stroke-width="1.5" opacity="0.4" />
    <text x="40" y="24" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="30" font-weight="800" fill="#ffffff" letter-spacing="-0.6">Trendi<tspan fill="#00C896">Buzz</tspan></text>
  </g>

  <!-- Eyebrow -->
  <g transform="translate(80, 200)">
    <rect x="0" y="0" width="340" height="38" rx="19" fill="none" stroke="#00C896" stroke-opacity="0.45" stroke-width="1" />
    <text x="20" y="25" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="14" font-weight="700" fill="#00C896" letter-spacing="3">FOR FINANCE &amp; BUSINESS CREATORS</text>
  </g>

  <!-- Headline -->
  <text x="80" y="340" font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="72" font-weight="800" fill="#ffffff" letter-spacing="-2.4">Your competitors are</text>
  <text x="80" y="418" font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="72" font-weight="800" fill="#ffffff" letter-spacing="-2.4">telling you what to post.</text>

  <!-- Subhead -->
  <text x="80" y="490" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="28" font-weight="500" fill="#00C896" letter-spacing="-0.4">AI clips · competitor gap analysis · every platform</text>

  <!-- Footer row -->
  <g transform="translate(80, 560)">
    <text x="0" y="22" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="20" font-weight="600" fill="#cccccc">trendibuzz.app</text>
    <text x="1040" y="22" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="16" font-weight="500" fill="#666666">Built by Command AI</text>
  </g>

  <!-- Accent arc -->
  <path d="M 950 180 Q 1050 240 1020 340 T 950 470" stroke="#00C896" stroke-width="2" fill="none" opacity="0.25" stroke-dasharray="4 8" />
</svg>
